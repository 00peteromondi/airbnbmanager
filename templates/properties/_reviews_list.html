{% for review in reviews %}
    <article class="rounded-[0.95rem] border border-slate-100 bg-slate-50 p-5" data-review-id="{{ review.id }}">
        <div class="flex items-center justify-between gap-3 flex-wrap">
            <div>
                <p class="font-semibold">{{ review.user.get_display_name }}</p>
                <p class="text-sm text-slate-500">{{ review.created_at|date:"M d, Y" }}</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="rating-meter" style="--rating: {{ review.rating|floatformat:1 }};"></span>
                <span class="badge badge-warm"><i class="fa-solid fa-star"></i>{{ review.rating|floatformat:1 }}</span>
            </div>
        </div>
        <p class="mt-3 text-slate-600">{{ review.comment }}</p>
    </article>
{% empty %}
    <div class="empty-state rounded-[0.95rem] px-6">
        <div>
            <i class="fa-solid fa-comments text-2xl text-red-500"></i>
            <p class="mt-3 font-semibold text-slate-800">No reviews yet</p>
            <p class="text-sm text-slate-500 mt-1">The first guest review will appear here once someone shares their stay experience.</p>
        </div>
    </div>
{% endfor %}
