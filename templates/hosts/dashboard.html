{% extends 'base.html' %}
{% load humanize %}
{% block title %}Host workspace | BayStays{% endblock %}
{% block content %}
<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12 space-y-6">
    <div class="live-panel" data-live-region data-live-url="{% url 'hosts:dashboard_live' %}" data-live-version="{{ live_version }}" data-live-poll-interval="9000" data-live-group="host-dashboard-{{ request.user.id }},host-listings-{{ request.user.id }},host-bookings-{{ request.user.id }}">
        <div data-live-content>
            {% include 'hosts/_dashboard_content.html' %}
        </div>
    </div>
</section>
{% endblock %}
