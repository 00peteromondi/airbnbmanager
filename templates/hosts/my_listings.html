{% extends 'base.html' %}
{% load humanize %}
{% load property_extras %}
{% block title %}My listings | BayStays{% endblock %}
{% block content %}
<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12 space-y-6">
    <div class="live-panel" data-live-region data-live-url="{% url 'hosts:my_listings_live' %}" data-live-version="{{ live_version }}" data-live-poll-interval="9000" data-live-group="host-listings-{{ request.user.id }},public-explore">
        <div data-live-content>
            {% include 'hosts/_my_listings_content.html' %}
        </div>
    </div>
</section>
{% endblock %}
